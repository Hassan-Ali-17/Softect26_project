version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: fairgig-postgres
    environment:
      POSTGRES_USER: fairgig
      POSTGRES_PASSWORD: fairgig
      POSTGRES_DB: fairgig
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed.sql:/seed.sql

  redis:
    image: redis:7
    container_name: fairgig-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
